name: keep-alive

# Mantém o cron do youtube-bot ativo.
# GitHub desativa agendamentos em repos sem atividade por ~60 dias.
# Esse workflow faz um commit a cada 2 dias para evitar isso.

on:
  schedule:
    - cron: "0 8 */2 * *"   # a cada 2 dias às 8h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump timestamp
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .keepalive
          git add .keepalive
          git commit -m "keep-alive [skip ci]" || echo "Nada a commitar"
          git push origin HEAD:main || true
