name: youtube-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: youtube-bot-main
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-22.04
    timeout-minutes: 55
    env:
      PYTHONUNBUFFERED: "1"
      ENABLE_REMOTION: "false"
      SHORTS_PER_TRACK: "1"
      FFMPEG_CRF: "20"
      FFMPEG_PRESET: "veryfast"
      FFMPEG_FPS: "30"
      FINAL_GRAIN_STRENGTH: "4"
      FFMPEG_RENDER_TIMEOUT: "720"
      FFMPEG_THUMB_TIMEOUT: "120"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -q \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation
          ffmpeg -version | head -n 1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare folders
        run: |
          mkdir -p output temp assets/backgrounds assets/source_videos
          test -f state.json || echo '{"tracks":[],"alpha_index":0}' > state.json

      - name: Run Bot
        timeout-minutes: 48
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_ENABLE_POSTING: ${{ secrets.FB_ENABLE_POSTING }}
          ENABLE_DRIVE_BACKUP: ${{ secrets.ENABLE_DRIVE_BACKUP }}
          DRIVE_BACKUP_FOLDER_ID: ${{ secrets.DRIVE_BACKUP_FOLDER_ID }}
        run: |
          echo "=== START $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
          python main.py
          echo "=== END $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="

      - name: Commit state.json
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f state.json ]; then
            echo '{"tracks":[],"alpha_index":0}' > state.json
          fi
          cp state.json /tmp/state.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/state.json state.json
          git add -f state.json
          if git diff --cached --quiet; then
            echo "state.json sem alterações."
            exit 0
          fi
          git commit -m "update state [skip ci]"
          git push origin HEAD:main
