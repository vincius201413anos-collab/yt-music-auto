name: youtube-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

concurrency:
  group: youtube-bot-main
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update -y -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -q \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation
          ffmpeg -version | head -n 1
          echo "Fontes disponíveis:"
          fc-list | grep -i "bold" | head -5 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare folders
        run: |
          mkdir -p output temp assets/backgrounds assets/source_videos

      - name: Run Bot
        env:
          GOOGLE_CREDENTIALS:          ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID:             ${{ secrets.DRIVE_FOLDER_ID }}
          YOUTUBE_CREDENTIALS:         ${{ secrets.YOUTUBE_CREDENTIALS }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN:         ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN:                    ${{ secrets.HF_TOKEN }}
          OPENAI_API_KEY:              ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== START $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
          python main.py
          echo "=== END $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="

      - name: Commit state.json
        if: always()
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "state.json sem alterações."
            exit 0
          fi
          git fetch origin main
          git pull --rebase origin main || true
          git commit -m "update state [skip ci]"
          git push origin HEAD:main || true
