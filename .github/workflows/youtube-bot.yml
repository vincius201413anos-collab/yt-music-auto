name: youtube-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # todo hora exata — mais confiável que minuto arbitrário

permissions:
  contents: write

concurrency:
  group: youtube-bot-main
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -y -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -q ffmpeg
          ffmpeg -version | head -n 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare folders
        run: mkdir -p output temp assets/backgrounds

      - name: Run Bot
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "=== BOT START $(date -u) ==="
          python main.py
          echo "=== BOT END $(date -u) ==="

      - name: Save videos artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_number }}
          path: output/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit state
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "Nada para commitar"
            exit 0
          fi
          git fetch origin main
          git pull --rebase origin main || true
          git commit -m "update state [skip ci]"
          git push origin HEAD:main || true
