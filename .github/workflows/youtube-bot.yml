name: youtube-bot
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"
permissions:
  contents: write
concurrency:
  group: youtube-bot-main
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # job inteiro: 55min (deixa 5min pro cleanup)
    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      ENABLE_REMOTION: "true"
      REMOTION_COMPOSITION_ID: "MyComposition"
      REMOTION_ENTRY: "index.ts"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install system dependencies
        run: |
          sudo apt-get update -y -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -q \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            xvfb \
            chromium-browser \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpangocairo-1.0-0
          ffmpeg -version | head -n 1
          chromium-browser --version || echo "chromium não instalado (não crítico)"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Remotion node_modules
        uses: actions/cache@v4
        with:
          path: remotion/node_modules
          key: remotion-node-modules-${{ hashFiles('remotion/package.json') }}
          restore-keys: |
            remotion-node-modules-

      - name: Install Remotion dependencies
        run: |
          cd remotion
          npm install --prefer-offline

      - name: Prepare folders
        run: |
          mkdir -p output temp assets/backgrounds assets/source_videos remotion/public
          test -f state.json || echo '{"tracks":[],"alpha_index":0}' > state.json

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      - name: Run Bot
        timeout-minutes: 48  # step do bot: 48min (sobra tempo pro Commit state.json)
        env:
          DISPLAY: ":99"
          # Força Chromium headless a usar renderer de software (sem GPU)
          REMOTION_GL: "swiftshader"
          # Aponta pro chromium do sistema em vez do bundled do Remotion
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          # Flags extras do Chrome para CI headless
          CHROME_FLAGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu"
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_ENABLE_POSTING: ${{ secrets.FB_ENABLE_POSTING }}
          ENABLE_DRIVE_BACKUP: ${{ secrets.ENABLE_DRIVE_BACKUP }}
          DRIVE_BACKUP_FOLDER_ID: ${{ secrets.DRIVE_BACKUP_FOLDER_ID }}
          ENABLE_REMOTION: "true"
          REMOTION_COMPOSITION_ID: "MyComposition"
          REMOTION_ENTRY: "index.ts"
          REMOTION_CONCURRENCY: "1"
          SHORTS_PER_TRACK: "1"
        run: |
          echo "=== START $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
          python main.py
          echo "=== END $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="

      - name: Commit state.json
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f state.json ]; then
            echo '{"tracks":[],"alpha_index":0}' > state.json
          fi
          cp state.json /tmp/state.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/state.json state.json
          git add -f state.json
          if git diff --cached --quiet; then
            echo "state.json sem alterações."
            exit 0
          fi
          git commit -m "update state [skip ci]"
          git push origin HEAD:main
