name: Render Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"
      ENABLE_REMOTION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: remotion/package-lock.json

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update -y -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -q \
            ffmpeg fonts-dejavu-core fonts-liberation

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare folders
        run: |
          mkdir -p temp output remotion/public assets/backgrounds
          test -f state.json || echo '{"tracks":[],"alpha_index":0}' > state.json

      - name: Install Remotion dependencies
        run: |
          cd remotion
          npm install

      - name: Run bot
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DRIVE_BACKUP_FOLDER_ID: ${{ secrets.DRIVE_BACKUP_FOLDER_ID }}

          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}

          ENABLE_YOUTUBE: "true"
          ENABLE_FACEBOOK: "false"
          ENABLE_REMOTION: "true"

          REMOTION_COMPOSITION_ID: "MyComposition"
          REMOTION_ENTRY: "index.ts"

        run: |
          python main.py
